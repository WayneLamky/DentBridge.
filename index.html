    <script>
      (function () {
        // Assign each radio's value from its sibling <span> text.
        // React renders radios AFTER DOMContentLoaded, so we observe the DOM
        // instead of running once on load (the previous behavior was a no-op).
        function syncRadioValue(radio) {
          if (!radio || radio.dataset.valueSynced === '1') return;
          var parent = radio.parentElement;
          var span = parent && parent.querySelector('span');
          if (span) {
            radio.value = span.textContent.trim();
            radio.dataset.valueSynced = '1';
          }
        }
        function syncAll(root) {
          (root || document).querySelectorAll('input[type="radio"]').forEach(syncRadioValue);
        }

        var observer = new MutationObserver(function (mutations) {
          for (var i = 0; i < mutations.length; i++) {
            var added = mutations[i].addedNodes;
            for (var j = 0; j < added.length; j++) {
              var node = added[j];
              if (node.nodeType !== 1) continue;
              if (node.matches && node.matches('input[type="radio"]')) {
                syncRadioValue(node);
              } else if (node.querySelectorAll) {
                syncAll(node);
              }
            }
          }
        });

        function start() {
          syncAll();
          var root = document.getElementById('root') || document.body;
          observer.observe(root, { childList: true, subtree: true });
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', start, { once: true });
        } else {
          start();
        }

        // "开始路线评估" button scrolls to the assessment form.
        document.addEventListener('click', function (e) {
          var btn = e.target.closest && e.target.closest('button.bg-\\[\\#E5E7EB\\]');
          if (!btn) return;
          var target = document.getElementById('assessment');
          if (!target) return;
          e.stopPropagation();
          e.preventDefault();
          var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
          target.scrollIntoView({ behavior: reduce ? 'auto' : 'smooth' });
        }, true);
      })();
    </script>
